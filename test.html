<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XpressO Embedded — Test</title>
  <style>
       *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; display: flex; flex-direction: column; height: 100vh; gap: 0.75rem; }
    h1 { font-size: 1.1rem; margin: 0; }
    .panel { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .legend { font-size: 0.75rem; color: #555; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .legend .evt { display: inline-flex; align-items: center; gap: 0.35rem; }
    .dot { width: 0.6rem; height: 0.6rem; border-radius: 50%; display: inline-block; }
    .dot.ready    { background: #6b7280; }
    .dot.complete { background: #16a34a; }
    .dot.exit     { background: #2563eb; }
    .dot.error    { background: #dc2626; }
    #log { background: #f5f5f5; padding: 0.75rem 1rem; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.8rem; max-height: 160px; overflow-y: auto; white-space: pre-wrap; margin: 0; }
    #log .line { padding: 0.1rem 0; border-left: 3px solid transparent; padding-left: 0.5rem; }
    #log .line.ready    { border-color: #6b7280; }
    #log .line.complete { border-color: #16a34a; }
    #log .line.exit     { border-color: #2563eb; }
    #log .line.error    { border-color: #dc2626; }
    #log .ts { color: #999; }
    #log .name { font-weight: 600; }
    xpresso-embedded { display: block; flex: 1; min-height: 0; }
    /* xpresso-embedded{display:block;width:100vw;height:100vh} */
  </style>
</head>
<body>

  <h1>Xpresso Embedded — Integration Test</h1>

  <div class="legend">
    <span>Events:</span>
    <span class="evt"><span class="dot ready"></span>xpresso:ready</span>
    <span class="evt"><span class="dot complete"></span>xpresso:complete</span>
    <span class="evt"><span class="dot exit"></span>xpresso:exit</span>
    <span class="evt"><span class="dot error"></span>xpresso:error</span>
  </div>

  <div id="log">Events will appear here…</div>

  <xpresso-embedded study-id="DEV" participant-id="PART-001" language="en"></xpresso-embedded>

  <script src="https://saxpressoproembedded.blob.core.windows.net/xpresso-pro-embedded-dev/@mocacognition/xpresso-embedded/latest/xpresso-embedded.umd.js"></script>
  <script>
  XpressOEmbedded.register();

  const logEl = document.getElementById('log');
    let firstLog = true;

    function log(kind, name, detail) {
      if (firstLog) { logEl.textContent = ''; firstLog = false; }
      const line = document.createElement('div');
      line.className = 'line ' + kind;
      const ts = new Date().toISOString();
      const payload = detail !== undefined ? '  →  ' + JSON.stringify(detail) : '';
      line.innerHTML =
        '<span class="ts">[' + ts + ']</span> ' +
        '<span class="name">' + name + '</span>' +
        escapeHtml(payload);
      logEl.prepend(line);
    }

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    const el = document.querySelector('xpresso-embedded');

    // Fired by the web component once the bundle has loaded and the app mounted. detail: {}
    el.addEventListener('xpresso:ready', () => log('ready', 'xpresso:ready'));

    // Fired when the assessment is scored. detail: { result: { sessionId, xpressOScore,
    // totalScore, memoryTaskScore, logicalTaskScore, timeTaken, createdOnUTC } }
    el.addEventListener('xpresso:complete', (e) => log('complete', 'xpresso:complete', e.detail));

    // Fired when the participant finishes the report screen. detail: { sessionId }
    el.addEventListener('xpresso:exit', (e) => log('exit', 'xpresso:exit', e.detail));

    // Fired on bundle-load / render / session error. detail: { error: { code, message } }
    el.addEventListener('xpresso:error', (e) => log('error', 'xpresso:error', e.detail));

  </script>
 
</body>
</html>
